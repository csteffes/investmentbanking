<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 1600" width="1200" height="1600" role="img" aria-label="Glass skyscraper against a blue sky">
  <defs>
    <linearGradient id="sky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#5C9FE7"/>
      <stop offset="55%" stop-color="#2E6DAE"/>
      <stop offset="100%" stop-color="#143C67"/>
    </linearGradient>
    <linearGradient id="towerFace" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#2F8BC9"/>
      <stop offset="100%" stop-color="#0F3C6E"/>
    </linearGradient>
    <linearGradient id="towerEdge" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#8AB0CA"/>
      <stop offset="100%" stop-color="#365C7A"/>
    </linearGradient>
    <filter id="cloudBlur" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="14"/>
    </filter>
  </defs>

  <rect width="1200" height="1600" fill="url(#sky)"/>

  <g opacity="0.78" filter="url(#cloudBlur)">
    <ellipse cx="1050" cy="135" rx="78" ry="36" fill="#FFFFFF"/>
    <ellipse cx="965" cy="160" rx="60" ry="28" fill="#FFFFFF"/>
    <ellipse cx="870" cy="282" rx="92" ry="44" fill="#FFFFFF"/>
    <ellipse cx="742" cy="332" rx="48" ry="24" fill="#FFFFFF"/>
    <ellipse cx="325" cy="410" rx="84" ry="38" fill="#FFFFFF"/>
    <ellipse cx="240" cy="442" rx="58" ry="28" fill="#FFFFFF"/>
    <ellipse cx="165" cy="915" rx="74" ry="32" fill="#FFFFFF"/>
    <ellipse cx="915" cy="985" rx="64" ry="29" fill="#FFFFFF"/>
    <ellipse cx="1020" cy="1110" rx="84" ry="35" fill="#FFFFFF"/>
  </g>

  <g>
    <polygon points="650,0 1170,0 1200,1600 915,1600" fill="#0E355B" opacity="0.72"/>
    <polygon points="342,1600 675,0 880,0 620,1600" fill="url(#towerFace)"/>
    <polygon points="645,0 693,0 935,1600 885,1600" fill="url(#towerEdge)"/>
    <polygon points="865,0 895,0 1175,1600 1142,1600" fill="url(#towerEdge)" opacity="0.9"/>

    <g stroke="#71A8C7" stroke-opacity="0.78" stroke-width="3">
      <line x1="395" y1="1600" x2="700" y2="0"/>
      <line x1="450" y1="1600" x2="748" y2="0"/>
      <line x1="505" y1="1600" x2="795" y2="0"/>
      <line x1="560" y1="1600" x2="842" y2="0"/>
      <line x1="615" y1="1600" x2="890" y2="0"/>
      <line x1="670" y1="1600" x2="938" y2="0"/>
      <line x1="725" y1="1600" x2="986" y2="0"/>
      <line x1="780" y1="1600" x2="1034" y2="0"/>
    </g>

    <g stroke="#7FB4D4" stroke-opacity="0.62" stroke-width="3">
      <line x1="506" y1="150" x2="1032" y2="150"/>
      <line x1="487" y1="250" x2="1050" y2="250"/>
      <line x1="469" y1="350" x2="1067" y2="350"/>
      <line x1="451" y1="450" x2="1085" y2="450"/>
      <line x1="432" y1="550" x2="1102" y2="550"/>
      <line x1="414" y1="650" x2="1120" y2="650"/>
      <line x1="396" y1="750" x2="1137" y2="750"/>
      <line x1="378" y1="850" x2="1155" y2="850"/>
      <line x1="359" y1="950" x2="1172" y2="950"/>
      <line x1="341" y1="1050" x2="1190" y2="1050"/>
      <line x1="323" y1="1150" x2="1200" y2="1150"/>
      <line x1="305" y1="1250" x2="1200" y2="1250"/>
      <line x1="286" y1="1350" x2="1200" y2="1350"/>
      <line x1="268" y1="1450" x2="1200" y2="1450"/>
    </g>

    <polygon points="0,1540 1200,1540 1200,1600 0,1600" fill="#0A111C" opacity="0.74"/>
  </g>
