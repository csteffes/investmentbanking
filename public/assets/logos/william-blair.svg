<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 380 60" role="img" aria-label="William Blair">
  <!-- WB monogram -->
  <text x="4" y="42" fill="#1B355A" font-family="Georgia,'Times New Roman',serif" font-size="40" font-weight="700" letter-spacing="-0.04em">WB</text>
  <!-- Divider -->
  <line x1="62" y1="10" x2="62" y2="50" stroke="#1B355A" stroke-width="1.5" opacity="0.3"/>
  <!-- Wordmark -->
  <text x="72" y="27" fill="#1B355A" font-family="'Helvetica Neue',Arial,sans-serif" font-size="14" font-weight="700" letter-spacing="0.12em">WILLIAM</text>
  <text x="72" y="46" fill="#1B355A" font-family="'Helvetica Neue',Arial,sans-serif" font-size="14" font-weight="700" letter-spacing="0.12em">BLAIR</text>
</svg>
