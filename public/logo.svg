<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 192 44" width="192" height="44" role="img" aria-label="Superday AI">
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@1&amp;display=swap');
    </style>
  </defs>

  <!-- Broadcast arc icon (3 concentric arcs + gold base dot) -->
  <!-- Outer arc -->
  <path d="M2 38 Q2 10 14 10 Q26 10 26 38"
        stroke="#2f6bff" stroke-width="1.8" stroke-linecap="round" fill="none" opacity="0.35"/>
  <!-- Mid arc -->
  <path d="M6.5 38 Q6.5 15 14 15 Q21.5 15 21.5 38"
        stroke="#2f6bff" stroke-width="1.8" stroke-linecap="round" fill="none" opacity="0.65"/>
  <!-- Inner arc -->
  <path d="M11 38 Q11 22 14 22 Q17 22 17 38"
        stroke="#2f6bff" stroke-width="2" stroke-linecap="round" fill="none"/>
  <!-- Gold base dot -->
  <circle cx="14" cy="39.5" r="2.2" fill="#c9a227"/>

  <!-- Wordmark: "Superday" in Instrument Serif italic + "AI" gold pill -->
  <text
    x="34" y="33"
    font-family="'Instrument Serif', Georgia, 'Times New Roman', serif"
    font-style="italic"
    font-size="28"
    fill="#0b1f3a"
    letter-spacing="-0.3"
  >Superday</text>

  <!-- "AI" pill -->
  <rect x="157" y="20" width="32" height="17" rx="8.5" fill="#c9a227"/>
  <text
    x="173" y="32"
    font-family="'Space Grotesk', system-ui, -apple-system, sans-serif"
    font-weight="700"
    font-size="10"
    fill="#0b1f3a"
    letter-spacing="1"
    text-anchor="middle"
  >AI</text>
</svg>
